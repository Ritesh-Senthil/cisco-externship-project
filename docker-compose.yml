services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eventshield
      POSTGRES_PASSWORD: eventshield
      POSTGRES_DB: eventshield
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventshield"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  splunk:
    image: splunk/splunk:9.3
    platform: linux/amd64
    environment:
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_PASSWORD: EventShield1!
      SPLUNK_HEC_TOKEN: eventshield-hec-token-change-me
      SPLUNK_LICENSE_URI: Free
    ports:
      - "8001:8000"   # Splunk Web UI (host 8001 to avoid clash with backend)
      - "8088:8088"   # HEC
      - "8089:8089"   # Management / REST API
    volumes:
      - splunk-data:/opt/splunk/var
      - ./splunk/default.yml:/tmp/defaults/default.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://eventshield:eventshield@postgres:5432/eventshield
      REDIS_URL: redis://redis:6379/0
      SPLUNK_HEC_URL: https://splunk:8088/services/collector
      SPLUNK_HEC_TOKEN: eventshield-hec-token-change-me
      SPLUNK_HEC_VERIFY_SSL: "false"
      SPLUNK_ENABLED: "true"
      CORS_ORIGINS: http://localhost:3000
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/api/stream
    depends_on:
      - backend

volumes:
  postgres-data:
  splunk-data:
